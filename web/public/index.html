        <!-- 
            COI Service Worker: Adds COOP/COEP headers for cross-origin isolation.
            IMPORTANT: This script MUST be served from the root (not a subdirectory) 
            to ensure the service worker can control all pages on the site.
            Required for SharedArrayBuffer and WASM features.
        -->
        <script src="%PUBLIC_URL%/coi-serviceworker.js"></script>
        <script type="application/javascript">
            // Check if SharedArrayBuffer is available (required for WASM)
            if (typeof SharedArrayBuffer !== "undefined") {
                console.log(" SharedArrayBuffer is available");
                console.log(" crossOriginIsolated:", window.crossOriginIsolated);
            } else {
                console.warn(" SharedArrayBuffer is NOT available - WASM will not work");
                console.warn("  crossOriginIsolated:", window.crossOriginIsolated);
                console.warn("  COOP/COEP headers may not be set correctly");
            }

            window.addEventListener("error", function (e) {
                // prevent React's listener from firing
                if (e.message.startsWith("ResizeObserver loop completed with undelivered")) {
                    e.stopImmediatePropagation();
                    console.log("error caught", e);
                    // prevent the browser's console error message
                    e.preventDefault();
                }
            });
        </script>
        <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
        <title>VAMS - Visual Asset Management System</title>
