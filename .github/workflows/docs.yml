name: Deploy Documentation

on:
    push:
        branches:
            - main
            - "release/*"
        paths:
            - "documentation/docusaurus-site/**"
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"
                  cache-dependency-path: documentation/docusaurus-site/package-lock.json

            - name: Install dependencies
              run: cd documentation/docusaurus-site && npm ci

            - name: Build documentation
              run: cd documentation/docusaurus-site && npm run build

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: documentation/docusaurus-site/build

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
